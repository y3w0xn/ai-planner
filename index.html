<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 피드백 플래너 v2</title>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.js'></script>
    <style>
        :root { --primary: #4A90E2; --success: #48BB78; --warning: #F6AD55; --danger: #F56565; --bg: #F8FAFC; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); padding: 20px; color: #2D3748; }
        .container { max-width: 900px; margin: 0 auto; background: #FFF; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .input-box { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #E2E8F0; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; grid-column: span 2; }
        
        /* 상태별 카드 스타일 */
        .day-card { border: 1px solid #EDF2F7; padding: 15px; border-radius: 12px; background: #FFF; transition: 0.3s; position: relative; margin-bottom: 10px; }
        .day-card.status-o { background: #F0FFF4; border-color: var(--success); } /* 완료 */
        .day-card.status-tri { background: #FFFAF0; border-color: var(--warning); } /* 일부 */
        .day-card.status-x { background: #FFF5F5; border-color: var(--danger); } /* 미완료 */
        
        .status-badge { position: absolute; top: 10px; right: 15px; font-size: 1.5rem; font-weight: bold; }
        .status-o .status-badge { color: var(--success); }
        .status-tri .status-badge { color: var(--warning); }
        .status-x .status-badge { color: var(--danger); }

        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        .btn-group button { padding: 5px; font-size: 0.8rem; grid-column: auto; }
        .btn-done { background: var(--success); }
        .btn-partial { background: var(--warning); }
        .btn-fail { background: var(--danger); }

        #calendar { margin-bottom: 30px; }
        .plan-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .update-box { margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.05); border-radius: 8px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center;">🎯 AI 정밀 피드백 플래너</h2>
        
        <div class="input-box">
            <div><label>과목</label><input type="text" id="subject" value="연구 데이터 분석"></div>
            <div><label>총 페이지</label><input type="number" id="total_pages" value="100"></div>
            <div><label>기간(일)</label><input type="number" id="days_left" value="7"></div>
            <div><label>집중도</label>
                <select id="concentration">
                    <option value="10">최상 (단기완성)</option>
                    <option value="7" selected>보통 (균형)</option>
                    <option value="4">낮음 (완성도 중심)</option>
                </select>
            </div>
            <button onclick="generatePlan()">플랜 생성</button>
        </div>

        <div id="calendar"></div>
        <div id="result" class="plan-list"></div>
    </div>

    <script>
        let calendar;
        let currentPlan = [];

        async function generatePlan() {
            const data = {
                subject: document.getElementById('subject').value,
                total_pages: parseInt(document.getElementById('total_pages').value),
                days_left: parseInt(document.getElementById('days_left').value),
                concentration: parseInt(document.getElementById('concentration').value)
            };

            const response = await fetch('/generate-plan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();
            // 각 날짜객체에 초기 상태값 추가
            currentPlan = result.plan.map(d => ({ ...d, status: 'none', originalStudy: d.study }));
            renderUI();
        }

        function renderUI() {
            if (calendar) calendar.destroy();
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                height: 400,
                events: currentPlan.map(d => ({ 
                    title: d.study, 
                    start: d.date, 
                    color: d.status === 'o' ? '#48BB78' : d.status === 'tri' ? '#F6AD55' : d.status === 'x' ? '#F56565' : '#4A90E2'
                }))
            });
            calendar.render();
            renderList();
        }

        function renderList() {
            let html = '';
            currentPlan.forEach((day, index) => {
                const statusClass = day.status === 'o' ? 'status-o' : day.status === 'tri' ? 'status-tri' : day.status === 'x' ? 'status-x' : '';
                const statusMark = day.status === 'o' ? '○' : day.status === 'tri' ? '△' : day.status === 'x' ? '×' : '';
                
                html += `
                    <div class="day-card ${statusClass}">
                        <div class="status-badge">${statusMark}</div>
                        <div style="font-size:0.85em;"><b>Day ${day.day}</b> | ${day.date}</div>
                        <div style="margin: 10px 0;">목표: <b>${day.study}</b></div>
                        
                        <div class="btn-group">
                            <button class="btn-done" onclick="updateStatus(${index}, 'o')">완료</button>
                            <button class="btn-partial" onclick="showUpdateBox(${index})">일부</button>
                            <button class="btn-fail" onclick="updateStatus(${index}, 'x', 0)">미완료</button>
                        </div>

                        <div id="update-box-${index}" class="update-box">
                            <p style="font-size:0.8em; margin:0 0 5px 0;">실제 공부한 페이지:</p>
                            <input type="number" id="actual-input-${index}" style="width:60px; padding:2px;"> p
                            <button onclick="confirmPartial(${index})" style="width:40px; padding:2px; margin-left:5px; background:var(--primary);">확인</button>
                        </div>
                    </div>`;
            });
            document.getElementById('result').innerHTML = html;
        }

        function updateStatus(index, status, actual) {
            if (currentPlan[index].status !== 'none') {
                alert("이미 상태가 확정된 날짜입니다.");
                return;
            }

            currentPlan[index].status = status;
            
            const target = parseInt(currentPlan[index].study);
            const done = (actual !== undefined) ? actual : (status === 'o' ? target : 0);
            const missed = target - done;

            if (missed > 0) {
                redistribute(index, missed);
            }
            renderUI();
        }

        function showUpdateBox(index) {
            if (currentPlan[index].status !== 'none') return;
            document.getElementById(`update-box-${index}`).style.display = 'block';
        }

        function confirmPartial(index) {
            const actual = parseInt(document.getElementById(`actual-input-${index}`).value) || 0;
            updateStatus(index, 'tri', actual);
        }

        function redistribute(currentIndex, missedPages) {
            // 남은 공부일 찾기
            const remainingDays = currentPlan.slice(currentIndex + 1).filter(d => d.study !== "휴식 및 보충");
            
            if (remainingDays.length > 0) {
                const extra = Math.floor(missedPages / remainingDays.length);
                const remainder = missedPages % remainingDays.length;

                let added = 0;
                for (let i = currentIndex + 1; i < currentPlan.length; i++) {
                    if (currentPlan[i].study !== "휴식 및 보충") {
                        const currentVal = parseInt(currentPlan[i].study);
                        // 골고루 분배하되 마지막 남은 짜투리는 첫날에 합산
                        const bonus = (added < remainder) ? 1 : 0;
                        currentPlan[i].study = (currentVal + extra + bonus) + "p";
                        added++;
                    }
                }
            }
        }
    </script>
</body>
</html>
