<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 플래너</title>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.js'></script>
    <style>
        :root { --primary: #4A90E2; --success: #48BB78; --warning: #F6AD55; --danger: #F56565; --bg: #F8FAFC; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); padding: 20px; color: #2D3748; line-height: 1.5; }
        .container { max-width: 1200px; margin: 0 auto; background: #FFF; padding: 30px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        
        .subject-tabs { display: flex; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; border-bottom: 2px solid #E2E8F0; padding-bottom: 10px; }
        .tab { padding: 10px 16px; background: #EDF2F7; border-radius: 10px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.2s; border-top: 3px solid transparent; }
        .tab.active { background: #FFF; border-bottom: 2px solid white; margin-bottom: -2px; box-shadow: 0 -4px 10px rgba(0,0,0,0.05); }
        .tab-all { background: #2D3748 !important; color: white !important; }

        .input-box { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; padding: 25px; background: #F7FAFC; border-radius: 18px; border: 1px dashed #CBD5E0; }
        input, select, button { padding: 10px; border-radius: 8px; border: 1px solid #E2E8F0; font-family: inherit; }
        .btn-main { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; grid-column: span 2; padding: 15px; font-size: 1rem; }
        
        .strategy-card { background: #EBF8FF; padding: 20px; border-radius: 15px; margin-bottom: 20px; border-left: 6px solid var(--primary); position: relative; }
        .btn-delete-sub { position: absolute; top: 15px; right: 15px; background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; }

        .progress-container { margin: 20px 0; background: #EDF2F7; border-radius: 25px; height: 24px; overflow: hidden; position: relative; }
        .progress-bar { background: linear-gradient(90deg, #4299E1, #48BB78); height: 100%; width: 0%; transition: 0.6s ease-in-out; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 0.8rem; font-weight: bold; line-height: 24px; }

        .plan-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .day-card { border: 1px solid #EDF2F7; padding: 20px; border-radius: 16px; background: #FFF; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .status-o { border-color: var(--success); background: #F0FFF4; }
        .status-tri { border-color: var(--warning); background: #FFFAF0; }
        .status-x { border-color: var(--danger); background: #FFF5F5; }
        
        .todo-section { margin-top: 15px; padding-top: 15px; border-top: 1px solid #E2E8F0; }
        .todo-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 0.9rem; }
        .todo-text.done { text-decoration: line-through; color: #A0AEC0; }
        .btn-todo-del { margin-left: auto; color: var(--danger); cursor: pointer; font-size: 0.7rem; border: none; background: none; }
        .todo-input-group { display: flex; gap: 5px; margin-top: 10px; }
        .btn-todo-add { background: #718096; color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; }

        #calendar { margin-bottom: 30px; background: white; padding: 15px; border-radius: 15px; border: 1px solid #E2E8F0; }
        .btn-group { display: flex; gap: 5px; margin-top: 12px; }
        .btn-group button { flex: 1; font-size: 0.75rem; cursor: pointer; color: white; border: none; border-radius: 6px; padding: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center; margin-bottom: 30px;">🔬 AI 플래너</h2>
        
        <div class="input-box">
            <div><label>연구 과목명</label><input type="text" id="subject" placeholder="예: 생명과학개론"></div>
            <div><label>총 분량 (페이지)</label><input type="number" id="total_pages" value="100"></div>
            <div><label>남은 기간 (일)</label><input type="number" id="days_left" value="7"></div>
            <div><label>집중도</label>
                <select id="concentration">
                    <option value="10">최상 (단기집중)</option>
                    <option value="7" selected>보통 (균형)</option>
                    <option value="4">낮음 (여유있게)</option>
                </select>
            </div>
            <button class="btn-main" id="submit-btn" onclick="generatePlan()">새로운 과목 플랜 추가</button>
        </div>

        <div id="subject-tabs" class="subject-tabs"></div>

        <div id="active-content" style="display:none;">
            <div id="strategy-info">
                <div id="strategy-card" class="strategy-card">
                    <button class="btn-delete-sub" onclick="deleteSubject()">과목 삭제</button>
                    <strong id="strategy-title"></strong>: <span id="strategy-tip"></span>
                </div>
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                    <div id="progress-text" class="progress-text">0%</div>
                </div>
            </div>
            <div id="calendar"></div>
            <div id="result" class="plan-list"></div>
        </div>
    </div>

    <script>
        let subjects = {}; 
        let activeSubject = null;
        let calendar;

        // [핵심 수정] 겹치지 않는 고성능 팔레트 (10색)
        const colorPalette = [
            '#4A90E2', // Blue
            '#F56565', // Red
            '#48BB78', // Green
            '#ED8936', // Orange
            '#9F7AEA', // Purple
            '#00B5AD', // Teal
            '#D53F8C', // Pink
            '#667EEA', // Indigo
            '#ECC94B', // Yellow
            '#2D3748'  // Dark Gray
        ];

        async function generatePlan() {
            const subjectName = document.getElementById('subject').value;
            if(!subjectName) return alert("과목명을 입력하세요");
            
            let targetColor;
            // 수정 모드일 때는 기존 색상 유지
            if(activeSubject && activeSubject !== 'all' && document.getElementById('submit-btn').innerText.includes("수정")) {
                targetColor = subjects[activeSubject].color;
                delete subjects[activeSubject];
            } else {
                // 신규 추가 시 순차적으로 배정
                const colorIdx = Object.keys(subjects).length % colorPalette.length;
                targetColor = colorPalette[colorIdx];
            }

            const data = {
                subject: subjectName,
                total_pages: parseInt(document.getElementById('total_pages').value),
                days_left: parseInt(document.getElementById('days_left').value),
                concentration: parseInt(document.getElementById('concentration').value)
            };

            const response = await fetch('/generate-plan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();

            subjects[subjectName] = {
                plan: result.plan.map(d => ({ ...d, status: 'none', actual: 0, todos: [] })),
                strategy: result.strategy,
                totalTarget: data.total_pages,
                progress: 0,
                config: data,
                color: targetColor
            };

            resetInput();
            switchTab(subjectName);
        }

        function renderTabs() {
            const container = document.getElementById('subject-tabs');
            container.innerHTML = '';
            
            const allTab = document.createElement('div');
            allTab.className = `tab tab-all ${activeSubject === 'all' ? 'active' : ''}`;
            allTab.innerHTML = `🗓️ 전체 통합 보기`;
            allTab.onclick = () => switchTab('all');
            container.appendChild(allTab);

            Object.keys(subjects).forEach(name => {
                const sub = subjects[name];
                const tab = document.createElement('div');
                tab.className = `tab ${name === activeSubject ? 'active' : ''}`;
                tab.style.borderTopColor = sub.color;
                if(name === activeSubject) {
                    tab.style.color = sub.color;
                    tab.style.background = "#FFF";
                }
                
                tab.innerHTML = `${name} <span style="font-size:0.7rem; opacity:0.7;">(${sub.progress}%)</span> <span class="btn-edit-sub" onclick="editSubjectConfig('${name}')">⚙️</span>`;
                tab.onclick = (e) => { if(!e.target.classList.contains('btn-edit-sub')) switchTab(name); };
                container.appendChild(tab);
            });
        }

        function switchTab(name) {
            activeSubject = name;
            document.getElementById('active-content').style.display = 'block';
            if(name === 'all') {
                document.getElementById('strategy-info').style.display = 'none';
                document.getElementById('result').style.display = 'none';
                renderCombinedUI();
            } else {
                document.getElementById('strategy-info').style.display = 'block';
                document.getElementById('result').style.display = 'grid';
                const sub = subjects[name];
                document.getElementById('strategy-title').innerText = sub.strategy.title;
                document.getElementById('strategy-tip').innerText = sub.strategy.tip;
                document.getElementById('strategy-card').style.borderLeftColor = sub.color;
                updateProgress();
                renderSingleUI();
            }
            renderTabs();
        }

        function renderSingleUI() {
            if (calendar) calendar.destroy();
            const sub = subjects[activeSubject];
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', height: 500,
                events: sub.plan.map(d => ({ 
                    title: `${d.study} ${d.todos.length > 0 ? '📝'+d.todos.length : ''}`, 
                    start: d.date, 
                    color: d.status === 'o' ? '#E2E8F0' : (d.study.includes("휴식") ? '#CBD5E0' : sub.color),
                    textColor: d.status === 'o' ? '#A0AEC0' : 'white'
                }))
            });
            calendar.render();
            renderList();
        }

        function renderCombinedUI() {
            if (calendar) calendar.destroy();
            let allEvents = [];
            Object.keys(subjects).forEach(name => {
                const sub = subjects[name];
                sub.plan.forEach(d => {
                    allEvents.push({
                        title: `[${name}] ${d.study}`,
                        start: d.date,
                        color: d.status === 'o' ? '#F1F5F9' : sub.color,
                        textColor: d.status === 'o' ? '#CBD5E0' : 'white'
                    });
                    d.todos.forEach(todo => {
                        allEvents.push({ title: `📌 ${todo.text}`, start: d.date, color: 'transparent', textColor: '#4A5568', display: 'list-item' });
                    });
                });
            });
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', height: 650, events: allEvents
            });
            calendar.render();
        }

        function renderList() {
            let html = '';
            const sub = subjects[activeSubject];
            sub.plan.forEach((day, index) => {
                const s = day.status;
                const todoHtml = day.todos.map((t, ti) => `<div class="todo-item"><input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${index}, ${ti})"><span class="todo-text ${t.done ? 'done' : ''}">${t.text}</span><button class="btn-todo-del" onclick="deleteTodo(${index}, ${ti})">✕</button></div>`).join('');
                html += `<div class="day-card ${s !== 'none' ? 'status-'+s : ''}"><div style="font-size:0.85em; color:#718096; font-weight:bold;">${day.date} <button class="btn-exclude" style="float:right" onclick="excludeDay(${index})">🚫 제외</button></div><div style="margin:12px 0;">배정: <input type="text" class="goal-input" style="width:100px" value="${day.study}" onchange="updateGoal(${index}, this.value)"></div><div class="btn-group" style="display: ${s === 'none' && !day.study.includes("휴식") ? 'flex' : 'none'}"><button style="background:var(--success)" onclick="confirmStatus(${index}, 'o')">완료</button><button style="background:var(--warning)" onclick="toggleInput(${index})">일부</button><button style="background:var(--danger)" onclick="confirmStatus(${index}, 'x')">미달</button></div><div id="input-box-${index}" class="update-input"><input type="number" id="actual-${index}" placeholder="실제량" style="width:60px;"><button onclick="confirmPartial(${index})" style="background:var(--primary); color:white; border:none; padding:5px 10px; border-radius:4px;">OK</button></div><div class="todo-section"><div style="font-size:0.8rem; font-weight:bold; color:var(--primary); margin-bottom:8px;">📝 개인 투두리스트</div>${todoHtml}<div class="todo-input-group"><input type="text" id="todo-in-${index}" placeholder="할 일 추가..." onkeypress="if(event.keyCode==13) addTodo(${index})"><button class="btn-todo-add" onclick="addTodo(${index})">추가</button></div></div></div>`;
            });
            document.getElementById('result').innerHTML = html;
        }

        function addTodo(dayIdx) { const input = document.getElementById(`todo-in-${dayIdx}`); if(!input.value) return; subjects[activeSubject].plan[dayIdx].todos.push({ text: input.value, done: false }); input.value = ''; renderSingleUI(); }
        function toggleTodo(dayIdx, todoIdx) { subjects[activeSubject].plan[dayIdx].todos[todoIdx].done = !subjects[activeSubject].plan[dayIdx].todos[todoIdx].done; renderList(); }
        function deleteTodo(dayIdx, todoIdx) { subjects[activeSubject].plan[dayIdx].todos.splice(todoIdx, 1); renderSingleUI(); }
        function updateGoal(index, val) { subjects[activeSubject].plan[index].study = val; renderSingleUI(); }
        function excludeDay(index) { const sub = subjects[activeSubject]; const missed = parseInt(sub.plan[index].study.replace(/[^0-9]/g, "")) || 0; sub.plan[index].study = "휴식(제외)"; if(missed > 0) redistribute(index, missed); renderSingleUI(); }
        function confirmStatus(index, status) { const sub = subjects[activeSubject]; const target = parseInt(sub.plan[index].study.replace(/[^0-9]/g, "")) || 0; if (status === 'o') { sub.plan[index].actual = target; applyChange(index, 'o', 0); } else { sub.plan[index].actual = 0; applyChange(index, 'x', target); } }
        function confirmPartial(index) { const sub = subjects[activeSubject]; const target = parseInt(sub.plan[index].study.replace(/[^0-9]/g, "")) || 0; const actual = parseInt(document.getElementById(`actual-${index}`).value) || 0; sub.plan[index].actual = actual; applyChange(index, 'tri', Math.max(0, target - actual)); }
        function applyChange(index, status, missed) { const sub = subjects[activeSubject]; sub.plan[index].status = status; if (missed > 0) redistribute(index, missed); updateProgress(); renderSingleUI(); }
        function redistribute(currentIndex, missedPages) { const sub = subjects[activeSubject]; const remaining = sub.plan.slice(currentIndex + 1).filter(d => !d.study.includes("휴식")); if (remaining.length === 0) return; const extra = Math.floor(missedPages / remaining.length); const rem = missedPages % remaining.length; let count = 0; for (let i = currentIndex + 1; i < sub.plan.length; i++) { if(sub.plan[i].study.includes("휴식")) continue; let curVal = parseInt(sub.plan[i].study.replace(/[^0-9]/g, "")) || 0; sub.plan[i].study = (curVal + extra + (count < rem ? 1 : 0)) + "p"; count++; } }
        function updateProgress() { const sub = subjects[activeSubject]; const totalActual = sub.plan.reduce((acc, d) => acc + (d.actual || 0), 0); sub.progress = Math.min(100, Math.round((totalActual / sub.totalTarget) * 100)); document.getElementById('progress-bar').style.width = sub.progress + '%'; document.getElementById('progress-text').innerText = `${sub.progress}% (${totalActual}/${sub.totalTarget}p)`; renderTabs(); }
        function deleteSubject() { if(confirm(`"${activeSubject}" 삭제?`)) { delete subjects[activeSubject]; switchTab('all'); } }
        function resetInput() { document.getElementById('subject').value = ""; document.getElementById('submit-btn').innerText = "새로운 과목 플랜 추가"; document.getElementById('submit-btn').style.background = "var(--primary)"; }
        function editSubjectConfig(name) { const sub = subjects[name]; document.getElementById('subject').value = name; document.getElementById('total_pages').value = sub.config.total_pages; document.getElementById('days_left').value = sub.config.days_left; document.getElementById('concentration').value = sub.config.concentration; document.getElementById('submit-btn').innerText = `"${name}" 정보 수정`; document.getElementById('submit-btn').style.background = "var(--warning)"; window.scrollTo(0,0); }
        function toggleInput(index) { document.getElementById(`input-box-${index}`).style.display = 'block'; }
    </script>
</body>
</html>
