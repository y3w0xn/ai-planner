<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 통합 연구 플래너 Pro</title>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.js'></script>
    <style>
        :root { --primary: #4A90E2; --success: #48BB78; --warning: #F6AD55; --danger: #F56565; --bg: #F8FAFC; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); padding: 20px; color: #2D3748; }
        .container { max-width: 1100px; margin: 0 auto; background: #FFF; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* 탭 디자인 */
        .subject-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; border-bottom: 2px solid #E2E8F0; padding-bottom: 10px; }
        .tab { padding: 10px 15px; background: #EDF2F7; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .tab.active { background: var(--primary); color: white; }
        .tab-all { background: #2D3748 !important; color: white !important; }
        .btn-edit-sub { font-size: 0.8rem; opacity: 0.6; }

        .input-box { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; padding: 20px; background: #F7FAFC; border-radius: 15px; border: 1px dashed #CBD5E0; }
        input, select, button { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #E2E8F0; }
        .btn-main { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; grid-column: span 2; padding: 15px; }
        
        .strategy-card { background: #EBF8FF; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 5px solid var(--primary); position: relative; }
        .btn-delete-sub { position: absolute; top: 10px; right: 10px; background: var(--danger); color: white; padding: 5px 10px; font-size: 0.7rem; border-radius: 5px; cursor: pointer; border: none; }

        .progress-container { margin: 15px 0; background: #EDF2F7; border-radius: 20px; height: 20px; overflow: hidden; position: relative; }
        .progress-bar { background: linear-gradient(90deg, #4299E1, #48BB78); height: 100%; width: 0%; transition: 0.5s; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 0.75rem; font-weight: bold; line-height: 20px; }

        .plan-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .day-card { border: 1px solid #EDF2F7; padding: 15px; border-radius: 12px; background: #FFF; position: relative; }
        .status-o { background: #F0FFF4; border-color: var(--success); }
        .status-tri { background: #FFFAF0; border-color: var(--warning); }
        .status-x { background: #FFF5F5; border-color: var(--danger); }
        
        .goal-input { font-weight: bold; width: 80px; padding: 2px; border: 1px solid #CBD5E0; border-radius: 4px; }
        .btn-exclude { background: #718096; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 0.7rem; padding: 2px 6px; }
        
        #calendar { margin-bottom: 30px; background: white; padding: 10px; border-radius: 10px; border: 1px solid #E2E8F0; }
        .update-input { display: none; margin-top: 10px; }
        .btn-group { display: flex; gap: 4px; margin-top: 10px; }
        .btn-group button { padding: 5px; font-size: 0.7rem; cursor: pointer; color: white; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center;">🔬 AI 통합 연구 플래너 Pro</h2>
        
        <div class="input-box">
            <div><label>과목명</label><input type="text" id="subject" placeholder="예: 물리학 실험"></div>
            <div><label>총 페이지</label><input type="number" id="total_pages" value="100"></div>
            <div><label>기간(일)</label><input type="number" id="days_left" value="7"></div>
            <div><label>집중도</label>
                <select id="concentration">
                    <option value="10">최상 (단기완성)</option>
                    <option value="7" selected>보통 (균형)</option>
                    <option value="4">낮음 (천천히)</option>
                </select>
            </div>
            <button class="btn-main" id="submit-btn" onclick="generatePlan()">새로운 과목 플랜 추가</button>
        </div>

        <div id="subject-tabs" class="subject-tabs"></div>

        <div id="active-content" style="display:none;">
            <div id="strategy-info">
                <div id="strategy-card" class="strategy-card">
                    <button class="btn-delete-sub" onclick="deleteSubject()">과목 삭제</button>
                    <strong id="strategy-title"></strong>: <span id="strategy-tip"></span>
                </div>
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                    <div id="progress-text" class="progress-text">0%</div>
                </div>
            </div>

            <div id="calendar"></div>
            <div id="result" class="plan-list"></div>
        </div>
    </div>

    <script>
        let subjects = {}; 
        let activeSubject = null; // 'all'인 경우 통합 보기
        let calendar;
        const colorPalette = ['#4A90E2', '#48BB78', '#F6AD55', '#9F7AEA', '#ED64A6', '#667EEA'];

        async function generatePlan() {
            const subjectName = document.getElementById('subject').value;
            if(!subjectName) return alert("과목명을 입력하세요");
            
            if(activeSubject !== 'all' && activeSubject && subjects[activeSubject] && document.getElementById('submit-btn').innerText.includes("수정")) {
                const oldColor = subjects[activeSubject].color;
                delete subjects[activeSubject];
                var targetColor = oldColor;
            } else {
                var targetColor = colorPalette[Object.keys(subjects).length % colorPalette.length];
            }

            const data = {
                subject: subjectName,
                total_pages: parseInt(document.getElementById('total_pages').value),
                days_left: parseInt(document.getElementById('days_left').value),
                concentration: parseInt(document.getElementById('concentration').value)
            };

            const response = await fetch('/generate-plan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();

            subjects[subjectName] = {
                plan: result.plan.map(d => ({ ...d, status: 'none', actual: 0 })),
                strategy: result.strategy,
                totalTarget: data.total_pages,
                progress: 0,
                config: data,
                color: targetColor
            };

            resetInput();
            switchTab(subjectName);
        }

        function resetInput() {
            document.getElementById('subject').value = "";
            document.getElementById('submit-btn').innerText = "새로운 과목 플랜 추가";
            document.getElementById('submit-btn').style.background = "var(--primary)";
        }

        function renderTabs() {
            const container = document.getElementById('subject-tabs');
            container.innerHTML = '';
            
            // [전체 보기] 탭 고정
            const allTab = document.createElement('div');
            allTab.className = `tab tab-all ${activeSubject === 'all' ? 'active' : ''}`;
            allTab.innerHTML = `🗓️ 전체 보기`;
            allTab.onclick = () => switchTab('all');
            container.appendChild(allTab);

            Object.keys(subjects).forEach(name => {
                const tab = document.createElement('div');
                tab.className = `tab ${name === activeSubject ? 'active' : ''}`;
                tab.style.borderLeft = `5px solid ${subjects[name].color}`;
                tab.innerHTML = `${name} <span class="btn-edit-sub" onclick="editSubjectConfig('${name}')">⚙️</span>`;
                tab.onclick = (e) => { if(!e.target.classList.contains('btn-edit-sub')) switchTab(name); };
                container.appendChild(tab);
            });
        }

        function switchTab(name) {
            activeSubject = name;
            document.getElementById('active-content').style.display = 'block';
            
            if(name === 'all') {
                document.getElementById('strategy-info').style.display = 'none';
                document.getElementById('result').style.display = 'none';
                renderCombinedUI();
            } else {
                document.getElementById('strategy-info').style.display = 'block';
                document.getElementById('result').style.display = 'grid';
                const sub = subjects[name];
                document.getElementById('strategy-title').innerText = sub.strategy.title;
                document.getElementById('strategy-tip').innerText = sub.strategy.tip;
                updateProgress();
                renderSingleUI();
            }
            renderTabs();
        }

        // 단일 과목 달력
        function renderSingleUI() {
            if (calendar) calendar.destroy();
            const sub = subjects[activeSubject];
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', height: 450,
                events: sub.plan.map(d => ({ 
                    title: d.study, start: d.date, 
                    color: d.status === 'o' ? '#48BB78' : d.status === 'tri' ? '#F6AD55' : d.status === 'x' ? '#F56565' : (d.study.includes("휴식") ? '#CBD5E0' : sub.color)
                }))
            });
            calendar.render();
            renderList();
        }

        // 통합 달력 (Dashboard)
        function renderCombinedUI() {
            if (calendar) calendar.destroy();
            let allEvents = [];
            Object.keys(subjects).forEach(name => {
                const sub = subjects[name];
                sub.plan.forEach(d => {
                    allEvents.push({
                        title: `[${name}] ${d.study}`,
                        start: d.date,
                        color: d.status === 'o' ? '#E2E8F0' : sub.color, // 완료된 건 흐리게
                        textColor: d.status === 'o' ? '#A0AEC0' : 'white'
                    });
                });
            });

            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', height: 600,
                events: allEvents,
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,dayGridWeek' }
            });
            calendar.render();
        }

        function renderList() {
            let html = '';
            const sub = subjects[activeSubject];
            sub.plan.forEach((day, index) => {
                const s = day.status;
                html += `
                    <div class="day-card ${s !== 'none' ? 'status-'+s : ''}">
                        <div style="font-size:0.8em; color:#718096;">${day.date} 
                            <button class="btn-exclude" onclick="excludeDay(${index})">🚫 제외</button>
                        </div>
                        <div style="margin:8px 0;">목표: <input type="text" class="goal-input" value="${day.study}" onchange="updateGoal(${index}, this.value)"></div>
                        <div class="btn-group" style="display: ${s === 'none' && !day.study.includes("휴식") ? 'flex' : 'none'}">
                            <button style="background:var(--success)" onclick="confirmStatus(${index}, 'o')">완료</button>
                            <button style="background:var(--warning)" onclick="toggleInput(${index})">일부</button>
                            <button style="background:var(--danger)" onclick="confirmStatus(${index}, 'x')">미달</button>
                        </div>
                        <div id="input-box-${index}" class="update-input">
                            <input type="number" id="actual-${index}" placeholder="량" style="width:50px;">
                            <button onclick="confirmPartial(${index})" style="background:var(--primary); color:white; width:40px; border:none; border-radius:4px;">OK</button>
                        </div>
                    </div>`;
            });
            document.getElementById('result').innerHTML = html;
        }

        function updateGoal(index, val) { subjects[activeSubject].plan[index].study = val; renderSingleUI(); }

        function excludeDay(index) {
            const sub = subjects[activeSubject];
            const missed = parseInt(sub.plan[index].study.replace(/[^0-9]/g, "")) || 0;
            sub.plan[index].study = "휴식(제외)";
            if(missed > 0) redistribute(index, missed);
            renderSingleUI();
        }

        function confirmStatus(index, status) {
            const sub = subjects[activeSubject];
            const target = parseInt(sub.plan[index].study.replace(/[^0-9]/g, "")) || 0;
            if (status === 'o') { sub.plan[index].actual = target; applyChange(index, 'o', 0); }
            else { sub.plan[index].actual = 0; applyChange(index, 'x', target); }
        }

        function confirmPartial(index) {
            const sub = subjects[activeSubject];
            const target = parseInt(sub.plan[index].study.replace(/[^0-9]/g, "")) || 0;
            const actual = parseInt(document.getElementById(`actual-${index}`).value) || 0;
            sub.plan[index].actual = actual;
            applyChange(index, 'tri', Math.max(0, target - actual));
        }

        function applyChange(index, status, missed) {
            const sub = subjects[activeSubject];
            sub.plan[index].status = status;
            if (missed > 0) redistribute(index, missed);
            updateProgress();
            renderSingleUI();
        }

        function redistribute(currentIndex, missedPages) {
            const sub = subjects[activeSubject];
            const remaining = sub.plan.slice(currentIndex + 1).filter(d => !d.study.includes("휴식"));
            if (remaining.length === 0) return;
            const extra = Math.floor(missedPages / remaining.length);
            const rem = missedPages % remaining.length;
            let count = 0;
            for (let i = currentIndex + 1; i < sub.plan.length; i++) {
                if(sub.plan[i].study.includes("휴식")) continue;
                let curVal = parseInt(sub.plan[i].study.replace(/[^0-9]/g, "")) || 0;
                sub.plan[i].study = (curVal + extra + (count < rem ? 1 : 0)) + "p";
                count++;
            }
        }

        function updateProgress() {
            const sub = subjects[activeSubject];
            const totalActual = sub.plan.reduce((acc, d) => acc + (d.actual || 0), 0);
            sub.progress = Math.min(100, Math.round((totalActual / sub.totalTarget) * 100));
            document.getElementById('progress-bar').style.width = sub.progress + '%';
            document.getElementById('progress-text').innerText = `${sub.progress}% (${totalActual}/${sub.totalTarget}p)`;
            renderTabs();
        }

        function deleteSubject() {
            if(confirm(`"${activeSubject}" 과목을 삭제하시겠습니까?`)) {
                delete subjects[activeSubject];
                switchTab('all');
            }
        }

        function editSubjectConfig(name) {
            const sub = subjects[name];
            document.getElementById('subject').value = name;
            document.getElementById('total_pages').value = sub.config.total_pages;
            document.getElementById('days_left').value = sub.config.days_left;
            document.getElementById('concentration').value = sub.config.concentration;
            document.getElementById('submit-btn').innerText = `"${name}" 수정하기`;
            document.getElementById('submit-btn').style.background = "var(--warning)";
            window.scrollTo(0,0);
        }

        function toggleInput(index) { document.getElementById(`input-box-${index}`).style.display = 'block'; }
    </script>
</body>
</html>
