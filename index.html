<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 연구원 플래너</title>
    <!-- FullCalendar CSS -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.js'></script>
    <style>
        :root { --primary: #4A90E2; --bg: #F8FAFC; --card: #FFFFFF; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .input-box { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #E2E8F0; font-size: 14px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; grid-column: span 2; margin-top: 10px; }
        
        /* 전략 박스 스타일 */
        #strategy-box { display: none; background: #EEF6FF; border-left: 5px solid var(--primary); padding: 15px; border-radius: 8px; margin: 20px 0; }
        #strategy-title { font-weight: bold; color: var(--primary); font-size: 1.1em; }
        #strategy-tip { font-size: 0.9em; color: #4A5568; margin-top: 5px; }

        /* 달력 스타일 */
        #calendar { margin-top: 30px; border: 1px solid #E2E8F0; padding: 15px; border-radius: 15px; background: #FFF; }
        .fc-event { cursor: pointer; font-size: 0.85em; padding: 2px; }

        .plan-list { margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .day-card { border: 1px solid #EDF2F7; padding: 15px; border-radius: 12px; background: #FFF; }
        .progress-bar { background: #EDF2F7; height: 6px; border-radius: 3px; margin: 10px 0; overflow: hidden; }
        .progress-fill { background: var(--primary); height: 100%; transition: width 0.5s; }
        .badge { display: inline-block; padding: 2px 6px; background: #EBF8FF; color: #2B6CB0; border-radius: 4px; font-size: 11px; margin: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center; color: #2D3748;">📅 AI 맞춤형 학습 엔진</h2>
        
        <div class="input-box">
            <div><label>과목</label><input type="text" id="subject" value="물리학 실험 연구"></div>
            <div><label>총 분량</label><input type="number" id="total_pages" value="100"></div>
            <div><label>남은 기간(일)</label><input type="number" id="days_left" value="7"></div>
            <div><label>오늘의 집중도</label>
                <select id="concentration">
                    <option value="10">최상 (몰입 모드)</option>
                    <option value="7" selected>보통 (꾸준함)</option>
                    <option value="4">낮음 (짧은 집중)</option>
                </select>
            </div>
            <button onclick="generatePlan()">분석 및 계획 생성</button>
        </div>

        <div id="strategy-box">
            <div id="strategy-title"></div>
            <div id="strategy-tip"></div>
        </div>

        <div id="calendar"></div>
        <div id="result" class="plan-list"></div>
    </div>

    <script>
        let calendar;

        async function generatePlan() {
            const data = {
                subject: document.getElementById('subject').value,
                total_pages: parseInt(document.getElementById('total_pages').value),
                days_left: parseInt(document.getElementById('days_left').value),
                concentration: parseInt(document.getElementById('concentration').value)
            };

            const response = await fetch('/generate-plan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();

            // 1. 학습 전략 표시
            document.getElementById('strategy-box').style.display = 'block';
            document.getElementById('strategy-title').innerText = result.strategy.title;
            document.getElementById('strategy-tip').innerText = result.strategy.tip;

            // 2. 달력 렌더링
            if (calendar) { calendar.destroy(); }
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                height: 450,
                events: result.plan.map(d => ({
                    title: `📖 ${d.study}`,
                    start: d.date,
                    backgroundColor: '#4A90E2',
                    borderColor: '#4A90E2'
                }))
            });
            calendar.render();

            // 3. 리스트 상세 표시
            let html = '';
            result.plan.forEach(day => {
                const reviews = day.review.map(r => `<span class="badge">♻️ ${r}</span>`).join('');
                html += `
                    <div class="day-card">
                        <div style="display:flex; justify-content:space-between; font-size:0.9em; font-weight:bold;">
                            <span>Day ${day.day}</span>
                            <span style="color:#718096;">${day.date}</span>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${day.progress}%"></div></div>
                        <div style="font-size:0.85em; color:#4A5568;">진도: <b>${day.study}</b></div>
                        <div style="margin-top:8px;">${reviews || '<span style="font-size:0.8em; color:#CBD5E0;">복습 없음</span>'}</div>
                    </div>`;
            });
            document.getElementById('result').innerHTML = html;
        }
    </script>
</body>
</html>
